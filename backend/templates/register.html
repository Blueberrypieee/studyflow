<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow — Daftar</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <main class="auth-wrapper">

    <div class="auth-card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-bolt-lightning"></i>
        </div>
        <h1 class="brand-name">Buat Akun</h1>
        <p class="brand-tagline">Mulai perjalanan belajarmu sekarang.</p>
      </div>

      <!-- Form -->
      <form class="auth-form" id="registerForm" novalidate>

        <!-- Username -->
        <div class="field-group" id="usernameGroup">
          <label class="field-label" for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon left">
              <i class="fa-solid fa-user"></i>
            </span>
            <input
              type="text"
              id="username"
              class="input-field"
              placeholder="Min. 6 karakter"
              autocomplete="username"
              maxlength="32"
            />
          </div>
          <span class="field-error" id="usernameError"></span>
        </div>

        <!-- Password -->
        <div class="field-group" id="passwordGroup">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon left">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input
              type="password"
              id="password"
              class="input-field"
              placeholder="Min. 6 karakter"
              autocomplete="new-password"
            />
            <button type="button" class="input-icon right toggle-password" id="togglePassword" aria-label="Toggle password">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>

          <!-- Password strength bar -->
          <div class="strength-bar-wrap" id="strengthWrap">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-register" id="registerBtn">
          <span class="btn-text">Daftar Sekarang</span>
          <span class="btn-loader" id="btnLoader">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
          </span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider"><span>atau</span></div>

      <!-- Back to login -->
      <p class="login-prompt">
        Sudah punya akun?
        <a href="/login" class="login-link">Masuk</a>
      </p>

    </div>

    <p class="watermark">© 2026 StudyFlow. All rights reserved.</p>

  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
